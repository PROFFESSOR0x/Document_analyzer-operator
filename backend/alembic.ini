# Alembic configuration file

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Syspath path that will be added to sys.path
prepend_sys_path = .

# Database URL (overridden in env.py)
sqlalchemy.url = driver://user:pass@localhost/dbname

# Timezone for migration timestamps
timezone = UTC

# Truncate slug length
truncate_slug_length = 40

# Set to true to run revision environment in a transaction
transaction_per_migration = false

# Include metadata in the context
include_schemas = true

# Render item type for autogenerate
render_item = false

# Compare type for autogenerate
compare_type = true

# Compare server defaults for autogenerate
compare_server_default = true

# Include object type filters
include_object = false

# Process revision directives
process_revision_directives = none

# Max length of constraint names
constraint_naming_convention =
    uq:uq_%(table_name)s_%(column_0_name)s
    ix:ix_%(table_name)s_%(column_0_name)s
    fk:fk_%(table_name)s_%(column_0_name)s_%(referred_table_name)s
    pk:pk_%(table_name)s

[post_write_hooks]
# Run black on generated migrations
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -q

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
