# Document Analyzer Operator - Redis Configuration
# Copy this file to your Redis configuration directory
# Location varies by OS:
#   Linux: /etc/redis/redis.conf.d/
#   Mac: /usr/local/etc/redis.conf.d/

# =============================================================================
# Network Settings
# =============================================================================

# Accept connections on the specified port
port 6379

# Bind to localhost only for security (disable for remote access)
bind 127.0.0.1

# Close the connection after a client is idle for N seconds (0 to disable)
timeout 0

# TCP keepalive
tcp-keepalive 300

# =============================================================================
# Security Settings
# =============================================================================

# Require clients to issue AUTH <PASSWORD> before processing any commands
# IMPORTANT: Change this password in production!
# requirepass your-secure-password-here

# Rename dangerous commands (optional)
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""

# =============================================================================
# Memory Management
# =============================================================================

# Set a memory usage limit
# maxmemory 2gb

# Eviction policy when maxmemory is reached
# maxmemory-policy allkeys-lru

# =============================================================================
# Persistence Settings
# =============================================================================

# Enable RDB persistence
save 900 1
save 300 10
save 60 10000

# RDB filename
dbfilename dump.rdb

# Working directory
dir ./

# Enable AOF persistence
appendonly yes
appendfilename "appendonly.aof"

# AOF fsync policy
# everysec = fsync every second (recommended balance)
# always = fsync every write (safest but slowest)
# no = let OS decide when to fsync (fastest but risky)
appendfsync everysec

# Don't fsync during rewrite
no-appendfsync-on-rewrite no

# Auto-rewrite AOF when it grows by this percentage
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# =============================================================================
# Performance Settings
# =============================================================================

# Maximum number of clients
maxclients 10000

# Slow log threshold (in microseconds)
slowlog-log-slower-than 10000

# Slow log max length
slowlog-max-len 128

# =============================================================================
# Advanced Settings
# =============================================================================

# Hash data structure optimization
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List data structure optimization
list-max-ziplist-size -2

# Set data structure optimization
set-max-intset-entries 512

# Sorted set data structure optimization
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog sparse representation limit
hll-sparse-max-bytes 3000

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Client query buffer limit
client-query-buffer-limit 1gb

# =============================================================================
# Logging Settings
# =============================================================================

# Log level
# debug, verbose, notice, warning
loglevel notice

# Log file (empty string = stdout)
logfile ""

# =============================================================================
# Cluster Settings (if using Redis Cluster)
# =============================================================================

# Enable cluster mode
# cluster-enabled yes

# Cluster configuration file
# cluster-config-file nodes.conf

# Cluster node timeout
# cluster-node-timeout 15000

# =============================================================================
# Native Setup Notes
# =============================================================================
#
# For development:
#   - Keep bind set to 127.0.0.1
#   - No password needed for local development
#   - Enable both RDB and AOF persistence
#
# For production:
#   - Set a strong password with requirepass
#   - Consider binding to specific network interface
#   - Enable TLS for encrypted connections
#   - Set appropriate maxmemory limit
#   - Monitor memory usage and persistence
#
# =============================================================================
